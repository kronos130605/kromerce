server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Maximum upload size
    client_max_body_size 20M;
    client_body_buffer_size 16k;
    client_body_timeout 300s;

    # Proxy buffer settings for large uploads
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle Vite build assets — ^~ gives precedence over regex locations
    location ^~ /build/ {
        root /var/www/html/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle images — ^~ gives precedence over regex locations
    location ^~ /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle storage (uploaded files)
    location ^~ /storage/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle other static assets directly
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle PWA manifest and service worker
    location ~* \.(webmanifest)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Main Laravel application
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing — php:8.4-fpm Docker image uses TCP on port 9000
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Handle preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Hide Nginx version
    server_tokens off;

    # Error pages
    error_page 404 /index.php;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
